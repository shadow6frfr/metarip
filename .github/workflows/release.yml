name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: metarip-linux
          - os: windows-latest
            artifact_name: metarip-windows.exe
          - os: macos-latest
            artifact_name: metarip-macos

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Crucial Fix: Explicitly declare the native Windows MINGW64 subsystem environment
    - name: Set up MSYS2 / GCC (Windows Only)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: mingw-w64-x86_64-gcc

    # Compiles using native Windows architecture configurations
    - name: Build Binary (Windows Static)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        gcc -std=c17 -O3 -Wall -Wextra -static src/main.c src/scanner.c src/worker.c src/queue.c -Iinclude -lws2_32 -o ${{ matrix.artifact_name }}

    - name: Build Binary (Linux Static / macOS Standard)
      if: matrix.os != 'windows-latest'
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          gcc -std=c17 -O3 -Wall -Wextra -static src/main.c src/scanner.c src/worker.c src/queue.c -Iinclude -pthread -o ${{ matrix.artifact_name }}
        else
          gcc -std=c17 -O3 -Wall -Wextra src/main.c src/scanner.c src/worker.c src/queue.c -Iinclude -pthread -o ${{ matrix.artifact_name }}
        fi

    - name: Upload Artifacts to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}